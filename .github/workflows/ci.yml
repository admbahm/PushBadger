name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build release binaries
        run: |
          GOOS=linux  GOARCH=amd64 go build -o pushbadger-linux-amd64   ./cmd/pushbadger
          GOOS=darwin GOARCH=arm64 go build -o pushbadger-darwin-arm64  ./cmd/pushbadger
          GOOS=darwin GOARCH=amd64 go build -o pushbadger-darwin-amd64  ./cmd/pushbadger
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: pushbadger-*
